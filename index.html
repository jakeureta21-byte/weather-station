<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESP32 Weather Station</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background-color: #0f172a;
    color: white;
    margin: 0;
    padding: 20px;
    text-align: center;
}
h1 { margin-bottom: 5px; color: #38bdf8; }
#date-time { margin-bottom: 30px; color: #94a3b8; font-size: 1.1em; }

.dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    max-width: 1000px;
    margin: 0 auto;
}
.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #334155;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
}
.label { color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.value { font-size: 2rem; font-weight: bold; }
.unit { font-size: 1rem; color: #38bdf8; margin-left: 4px; }

/* Specific Styles */
.fan-on { color: #4ade80; } 
.fan-off { color: #f87171; }
.rain-alert { color: #60a5fa; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0.5; } }

.btn { background: #38bdf8; border: none; padding: 10px 20px; border-radius: 8px; color: #0f172a; font-weight: bold; cursor: pointer; margin-top: 10px; }
.btn:hover { background: #0ea5e9; }

/* Wind Compass */
#compass {
    width: 150px;
    height: 150px;
    margin: 0 auto;
    position: relative;
}
#compass img {
    width: 100%;
    height: 100%;
    transition: transform 0.5s ease-out;
    transform-origin: 50% 50%;
}
</style>
</head>
<body>

<h1>Weather Monitoring System</h1>
<div id="date-time">Syncing time...</div>

<div class="dashboard">
    <div class="card"><div class="label">Temperature</div><span class="value" id="temp">--</span><span class="unit">°C</span></div>
    <div class="card"><div class="label">Humidity</div><span class="value" id="hum">--</span><span class="unit">%</span></div>
    <div class="card"><div class="label">Pressure</div><span class="value" id="pres">--</span><span class="unit">hPa</span></div>
    
    <div class="card"><div class="label">Air Quality (PM2.5)</div><span class="value" id="pm25">--</span><span class="unit">µg/m³</span></div>
    <div class="card"><div class="label">Wind Speed</div><span class="value" id="wind">--</span><span class="unit">km/h</span></div>
    
    <div class="card">
        <div class="label">Wind Direction</div>
        <div id="compass">
            <img src="https://i.imgur.com/6o2Q9mC.png" alt="Compass Arrow" id="compass-arrow">
        </div>
    </div>

    <div class="card"><div class="label">Rain Status</div><span class="value" id="rain">DRY</span></div>
    <div class="card"><div class="label">Fog Status</div><span class="value" id="fog">--</span></div>
    <div class="card"><div class="label">Battery</div><span class="value" id="batt">--</span><span class="unit">%</span></div>
    
    <div class="card">
        <div class="label">Fan Control</div>
        <div class="value" id="fan-status">OFF</div>
        <button class="btn" onclick="toggleFan()">TOGGLE FAN</button>
    </div>
</div>

<script>
// Firebase config
const firebaseConfig = {
    apiKey: "AIzaSyAj9oZblvzb7QLG6yC7VIzI0WQ8uqCkbio",
    databaseURL: "https://iot-weather-monitoring-s-b34e6-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Live Clock
setInterval(() => {
    const now = new Date();
    document.getElementById('date-time').innerText = now.toLocaleDateString() + " | " + now.toLocaleTimeString();
}, 1000);

// Read Weather Data
db.ref('Weather').on('value', (snap) => {
    const data = snap.val() || {};

    document.getElementById('temp').innerText = data.temperature || 0;
    document.getElementById('hum').innerText = data.humidity || 0;
    document.getElementById('pres').innerText = data.pressure || 0;
    document.getElementById('pm25').innerText = data.pm25 || 0;
    document.getElementById('wind').innerText = data.windSpeed || 0;
    document.getElementById('batt').innerText = data.batteryPercent || 0;

    // Rain
    const rainEl = document.getElementById('rain');
    if(data.rain === "YES") { 
        rainEl.innerText = "RAINING"; 
        rainEl.classList.add('rain-alert'); 
    } else { 
        rainEl.innerText = "DRY"; 
        rainEl.classList.remove('rain-alert'); 
    }

    // Fog
    const fogEl = document.getElementById('fog');
    if(data.fog === "FOGGY"){
        fogEl.innerText = "🌫 FOGGY";
        fogEl.style.color = "#cbd5f5";
    } else {
        fogEl.innerText = "CLEAR";
        fogEl.style.color = "#4ade80";
    }

    // Wind Compass rotation
    const arrow = document.getElementById('compass-arrow');
    const deg = data.windDegree || 0; // must send windDegree from ESP32
    arrow.style.transform = `rotate(${deg}deg)`;
});

// Fan status
let currentFanState = 0;
db.ref('Controls/FanStatus').on('value', (snap) => {
    currentFanState = snap.val() || 0;
    const fanEl = document.getElementById('fan-status');
    fanEl.innerText = currentFanState ? "ON" : "OFF";
    fanEl.className = currentFanState ? "value fan-on" : "value fan-off";
});

// Toggle fan
function toggleFan() {
    const newState = currentFanState === 1 ? 0 : 1;
    db.ref('Controls').update({ FanStatus: newState });
}
</script>
</body>
</html>
