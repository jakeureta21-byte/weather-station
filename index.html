<style>
/* Modern Reference Styling */
:root {
    --bg-dark: #0f172a;
    --card-bg: #1e293b;
    --accent: #38bdf8;
    --text-dim: #94a3b8;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background-color: var(--bg-dark);
    color: white;
    padding: 20px;
}

.dashboard {
    display: grid;
    grid-template-columns: repeat(4, 1fr); /* 4 columns like your image */
    gap: 15px;
    max-width: 1100px;
    margin: 0 auto;
}

.card {
    background: var(--card-bg);
    padding: 15px;
    border-radius: 12px;
    border: 1px solid #334155;
    text-align: center;
    transition: transform 0.2s;
}

.card i { color: var(--accent); margin-right: 8px; }
.label { color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 10px; display: block; }
.value { font-size: 1.8rem; font-weight: bold; display: inline-block; }
.unit { font-size: 1rem; color: var(--accent); margin-left: 5px; }

/* Battery Specifics */
.batt-subtext { display: block; color: var(--text-dim); font-size: 0.9rem; margin-top: 5px; }

/* Prediction & Alert Cards (Span 2 columns) */
.wide-card { grid-column: span 2; }

.btn-toggle {
    background: #38bdf8;
    border: none;
    padding: 8px 25px;
    border-radius: 6px;
    color: #0f172a;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
    width: 80%;
}
</style>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<div class="dashboard">
    <div class="card"><span class="label"><i class="fas fa-thermometer-half"></i> Temperature</span><span class="value" id="temp">--</span><span class="unit">°C</span></div>
    <div class="card"><span class="label"><i class="fas fa-droplet"></i> Humidity</span><span class="value" id="hum">--</span><span class="unit">%</span></div>
    <div class="card"><span class="label"><i class="fas fa-gauge-high"></i> Pressure</span><span class="value" id="pres">--</span><span class="unit">hPa</span></div>
    <div class="card"><span class="label"><i class="fas fa-wind"></i> Air Quality (PM2.5)</span><span class="value" id="pm25">--</span><span class="unit">µg/m³</span></div>

    <div class="card"><span class="label"><i class="fas fa-wind"></i> Wind Speed</span><span class="value" id="wind">--</span><span class="unit">km/h</span></div>
    <div class="card"><span class="label"><i class="fas fa-compass"></i> Wind Direction</span><span class="value" id="dir">--</span></div>
    <div class="card"><span class="label"><i class="fas fa-cloud-showers-heavy"></i> Rain Status</span><span class="value" id="rain">DRY</span></div>
    <div class="card"><span class="label"><i class="fas fa-smog"></i> Fog Status</span><span class="value" id="fog">CLEAR</span></div>

    <div class="card">
        <span class="label"><i class="fas fa-battery-three-quarters"></i> Battery</span>
        <span class="value" id="batt-pct">--</span><span class="unit">%</span>
        <span class="batt-subtext" id="batt-volts">0.0V</span> </div>
    
    <div class="card">
        <span class="label"><i class="fas fa-fan"></i> Fan Control</span>
        <div class="value" id="fan-status" style="color: #f87171;">OFF</div><br>
        <button class="btn-toggle" onclick="toggleFan()">TOGGLE FAN</button>
    </div>

    <div class="card wide-card">
        <span class="label">Weather Prediction</span>
        <div style="font-size: 1.2rem;"><i class="fas fa-cloud-sun-rain" style="font-size: 2rem;"></i> Partly Cloudy / 28°C</div>
    </div>
</div>
